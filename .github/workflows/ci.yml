name: CI

on:
  push:
    branches: [main, master, develop]
    tags: ['v*.*.*']
  pull_request:
    branches: [main, master]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ─── Quality Gate ──────────────────────────────────────────────────────────
  quality:
    name: Lint · Type-check · Test · Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.12'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Type-check
        run: bun run type-check

      - name: Unit & Integration Tests
        run: bun test --coverage
        env:
          PROVIDER: openai
          OPENAI_API_KEY: sk-test-fake-key-for-ci
          MCP_TRANSPORT: http
          PORT: 3001
          LOG_LEVEL: error

      - name: Check coverage thresholds (aggregate, excluding bootstrap files)
        run: |
          # Parse the lcov.info file produced by bun --coverage.
          # Excludes the two pure-DI bootstrap files that are intentionally uncovered:
          #   - providers/providers.module.ts  (NestJS DI factory)
          #   - transport/stdio.bootstrap.ts   (stdio-only runtime)
          python3 - <<'EOF'
          import sys, re

          lcov = open("coverage/lcov.info").read()
          EXCLUDE = {"providers.module.ts", "stdio.bootstrap.ts"}

          total_lines_found = total_lines_hit = total_fn_found = total_fn_hit = 0

          for block in lcov.strip().split("end_of_record"):
              sf = re.search(r"SF:(.+)", block)
              if not sf:
                  continue
              filename = sf.group(1).split("/")[-1]
              if filename in EXCLUDE:
                  continue
              for lf in re.findall(r"LF:(\d+)", block):
                  total_lines_found += int(lf)
              for lh in re.findall(r"LH:(\d+)", block):
                  total_lines_hit += int(lh)
              for fnf in re.findall(r"FNF:(\d+)", block):
                  total_fn_found += int(fnf)
              for fnh in re.findall(r"FNH:(\d+)", block):
                  total_fn_hit += int(fnh)

          line_pct = (total_lines_hit / total_lines_found * 100) if total_lines_found else 0
          fn_pct   = (total_fn_hit   / total_fn_found   * 100) if total_fn_found   else 0

          print(f"Coverage (excl. bootstrap): Functions={fn_pct:.2f}%  Lines={line_pct:.2f}%")
          fail = False
          if fn_pct < 90:
              print(f"❌ Function coverage {fn_pct:.2f}% < 90%")
              fail = True
          else:
              print(f"✅ Function coverage {fn_pct:.2f}% ≥ 90%")
          if line_pct < 90:
              print(f"❌ Line coverage {line_pct:.2f}% < 90%")
              fail = True
          else:
              print(f"✅ Line coverage {line_pct:.2f}% ≥ 90%")
          sys.exit(1 if fail else 0)
          EOF

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

      - name: Build TypeScript
        run: bun run build
        env:
          NODE_ENV: production

      - name: Verify bin entrypoint is executable
        run: |
          test -x dist/main.js && echo "dist/main.js is executable ✅" || (echo "dist/main.js is NOT executable ❌" && exit 1)
          head -1 dist/main.js | grep -q "^#!" && echo "shebang present ✅" || (echo "shebang missing ❌" && exit 1)

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  # ─── Security Audit ────────────────────────────────────────────────────────
  security:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.12'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Audit dependencies
        run: bun audit --audit-level=high

  # ─── Docker Build + Trivy Scan ─────────────────────────────────────────────
  docker:
    name: Docker Build · Trivy Scan
    runs-on: ubuntu-latest
    needs: quality

    permissions:
      contents: read
      packages: write
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: gpt-image-mcp:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: true

      - name: Test container health
        run: |
          docker run -d --name mcp-test \
            -e PROVIDER=openai \
            -e OPENAI_API_KEY=sk-fake-ci-key \
            -p 3002:3000 \
            gpt-image-mcp:ci
          for i in $(seq 1 12); do
            if curl -sf http://localhost:3002/health/live; then
              echo "Container healthy after ${i}×5s"
              break
            fi
            echo "Waiting... ($i/12)"
            sleep 5
          done
          curl -f http://localhost:3002/health/live || (docker logs mcp-test && exit 1)
          docker stop mcp-test

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: gpt-image-mcp:ci
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          exit-code: '1'
          ignore-unfixed: true

      - name: Upload Trivy scan results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

      - name: Build and push to ghcr.io (on tag or main branch)
        if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/'))
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── GitHub Packages (npm.pkg.github.com) ────────────────────────────────
  # Triggered only on semver tags (v*.*.*).
  # Uses the built-in GITHUB_TOKEN — no extra secret required.
  # Package name must be scoped: @bioinfornatics/gpt-image-mcp (set in package.json).
  # Auth: bun publish reads BUN_AUTH_TOKEN (not NODE_AUTH_TOKEN).
  # Install: bun add @bioinfornatics/gpt-image-mcp --registry https://npm.pkg.github.com
  # ────────────────────────────────────────────────────────────────────────────
  publish-gpr:
    name: Publish to GitHub Packages
    runs-on: ubuntu-latest
    needs: [quality, docker]
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: read
      packages: write   # required to push to npm.pkg.github.com

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.12'

      - name: Install all dependencies (build requires tsc from devDeps)
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Verify package version matches tag
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          PKG_VERSION=$(bun -e "console.log(require('./package.json').version)")
          if [ "$TAG" != "$PKG_VERSION" ]; then
            echo "❌ Tag v$TAG does not match package.json version $PKG_VERSION"
            echo "   Update package.json version before tagging."
            exit 1
          fi
          echo "✅ Tag v$TAG matches package.json version"

      - name: Show package contents (preview)
        # bun pm pack --dry-run: lists files without publishing or auth check
        run: bun pm pack --dry-run

      - name: Publish to GitHub Packages
        # publishConfig in package.json sets registry = https://npm.pkg.github.com.
        # Auth: BUN_AUTH_TOKEN env var (bun publish reads this, not ~/.npmrc).
        # Idempotent: check registry for existing version before publishing.
        # --tolerate-republish: suppresses exit 1 on 409 conflict (belt + suspenders).
        run: |
          VERSION=$(bun -e "console.log(require('./package.json').version)")
          if curl -sf -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
               "https://npm.pkg.github.com/@bioinfornatics%2fgpt-image-mcp" \
               2>/dev/null | grep -q "\"$VERSION\""; then
            echo "✅ Version $VERSION already published to GitHub Packages — skipping"
          else
            bun publish --access public --tolerate-republish --ignore-scripts
          fi
        env:
          BUN_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Confirm published version
        run: |
          VERSION=$(bun -e "console.log(require('./package.json').version)")
          echo "✅ Published: https://github.com/bioinfornatics/gpt-image-mcp/pkgs/npm/gpt-image-mcp"
          echo "   Install: bun add @bioinfornatics/gpt-image-mcp@$VERSION --registry https://npm.pkg.github.com"

  # ─── npmjs.com Publish ────────────────────────────────────────────────────
  # Triggered only on semver tags (v*.*.*).
  # Requires secret: NPM_TOKEN (Automation token from npmjs.com → Access Tokens).
  #
  # One-time setup:
  #   1. Create account / org @bioinfornatics at npmjs.com
  #   2. npmjs.com → Access Tokens → Generate New Token (Automation)
  #   3. GitHub repo → Settings → Secrets → Actions → New secret
  #      Name: NPM_TOKEN  Value: <paste token>
  #
  # Auth: bun publish reads BUN_AUTH_TOKEN (not NODE_AUTH_TOKEN).
  # To publish: git tag v0.0.1 && git push origin main --tags
  # ────────────────────────────────────────────────────────────────────────────
  publish-npm:
    name: Publish to npmjs.com
    runs-on: ubuntu-latest
    needs: [quality, docker]
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.12'

      - name: Install all dependencies (build requires tsc from devDeps)
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Verify package version matches tag
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          PKG_VERSION=$(bun -e "console.log(require('./package.json').version)")
          if [ "$TAG" != "$PKG_VERSION" ]; then
            echo "❌ Tag v$TAG does not match package.json version $PKG_VERSION"
            echo "   Update package.json version before tagging."
            exit 1
          fi
          echo "✅ Tag v$TAG matches package.json version"

      - name: Show package contents (preview)
        # bun pm pack --dry-run: lists files without publishing or auth check
        run: bun pm pack --dry-run

      - name: Publish to npmjs.com
        # --registry overrides publishConfig (which points to GitHub Packages by default)
        # --tolerate-republish: idempotent — does not fail if version already exists
        # --ignore-scripts: build already done; skip prepublishOnly
        # continue-on-error: GitHub Packages is the primary registry; npm is secondary
        continue-on-error: true
        run: bun publish --access public --tolerate-republish --ignore-scripts --registry https://registry.npmjs.org
        env:
          BUN_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Confirm published version
        run: |
          VERSION=$(bun -e "console.log(require('./package.json').version)")
          echo "✅ Published: https://www.npmjs.com/package/@bioinfornatics/gpt-image-mcp/v/$VERSION"
          echo "   Install: bun add @bioinfornatics/gpt-image-mcp@$VERSION"

  # ─── GitHub Release Notes ──────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [publish-gpr]
    # publish-npm is continue-on-error — release proceeds as long as GitHub Packages succeeded
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create or Update GitHub Release
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            const version = tag.replace(/^v/, '');
            const body = [
              `## Install`,
              ``,
              `### GitHub Packages`,
              `\`\`\`bash`,
              `bun add @bioinfornatics/gpt-image-mcp@${version} --registry https://npm.pkg.github.com`,
              `\`\`\``,
              ``,
              `### npmjs.com`,
              `\`\`\`bash`,
              `# Zero-install (Claude Desktop / Goose / Cursor):`,
              `bun x --bun @bioinfornatics/gpt-image-mcp@${version}`,
              ``,
              `# Global install:`,
              `bun add -g @bioinfornatics/gpt-image-mcp@${version}`,
              `\`\`\``,
              ``,
              `## Docker`,
              `\`\`\`bash`,
              `docker pull ghcr.io/\${{ github.repository }}:${version}`,
              `\`\`\``,
              ``,
              `---`,
              ``,
            ].join('\n');
            const params = {
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `Release ${tag}`,
              body,
              generate_release_notes: true,
              draft: false,
              prerelease: tag.includes('-'),
            };
            // Upsert: update if release already exists, create otherwise
            const existing = await github.rest.repos.getReleaseByTag({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag: tag,
            }).catch(() => null);
            if (existing) {
              await github.rest.repos.updateRelease({
                ...params,
                release_id: existing.data.id,
              });
              console.log(`Updated release ${tag}`);
            } else {
              await github.rest.repos.createRelease(params);
              console.log(`Created release ${tag}`);
            }
