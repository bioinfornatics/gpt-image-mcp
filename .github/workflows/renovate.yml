name: Renovate

# Run on schedule + allow manual trigger via GitHub UI / API.
# The RENOVATE_TOKEN secret must be a classic PAT with `repo` + `workflow` scopes.
# (GITHUB_TOKEN cannot be used — PRs opened with it do not trigger other CI workflows.)
on:
  schedule:
    # Monday at 03:00 UTC — quiet window, aligns with the work week start
    - cron: '0 3 * * 1'
  workflow_dispatch:
    inputs:
      dryRun:
        description: 'Dry-run mode (log only, no PRs created)'
        required: false
        default: 'false'
        type: choice
        options: ['true', 'false']
      logLevel:
        description: 'Log verbosity'
        required: false
        default: 'info'
        type: choice
        options: ['debug', 'info', 'warn', 'error']

jobs:
  renovate:
    name: Renovate dependency scan
    runs-on: ubuntu-latest

    permissions:
      contents: write        # push renovate/ branches
      pull-requests: write   # open / update PRs
      issues: write          # create / update Dependency Dashboard issue

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          # Full history lets Renovate inspect changelogs and commit ranges
          fetch-depth: 0

      - name: Run Renovate
        uses: renovatebot/github-action@cf5954a2aac7999882d3de4e462499adde159d04 # v41.0.17
        with:
          token: ${{ secrets.RENOVATE_TOKEN }}
        env:
          # Forwarded to the Renovate container
          LOG_LEVEL: ${{ inputs.logLevel || 'info' }}
          RENOVATE_DRY_RUN: ${{ inputs.dryRun || 'false' }}
          # Repository autodiscovery is off — this workflow runs in a single repo
          RENOVATE_AUTODISCOVER: 'false'
          RENOVATE_REPOSITORIES: ${{ github.repository }}
