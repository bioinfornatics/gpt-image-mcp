# Goose configuration for gpt-image-mcp
# Add this to: ~/.config/goose/config.yaml
#
# Documentation: https://block.github.io/goose/docs/configuration

extensions:
  # Option A: OpenAI via stdio (recommended for local use)
  - name: gpt-image-mcp
    type: stdio
    cmd: bun
    args:
      - run
      - /absolute/path/to/gpt-image-mcp/src/main.ts
    env:
      PROVIDER: openai
      OPENAI_API_KEY: sk-replace-with-your-key
      MCP_TRANSPORT: stdio
      DEFAULT_MODEL: gpt-image-1
      LOG_LEVEL: error

  # Option B: Azure OpenAI via stdio
  # - name: gpt-image-mcp-azure
  #   type: stdio
  #   cmd: bun
  #   args:
  #     - run
  #     - /absolute/path/to/gpt-image-mcp/src/main.ts
  #   env:
  #     PROVIDER: azure
  #     AZURE_OPENAI_ENDPOINT: https://my-resource.openai.azure.com
  #     AZURE_OPENAI_API_KEY: replace-with-azure-key
  #     AZURE_OPENAI_DEPLOYMENT: my-gpt-image-deployment
  #     MCP_TRANSPORT: stdio

  # Option C: Remote HTTP server (if running via Docker)
  # - name: gpt-image-mcp-remote
  #   type: streamable_http
  #   uri: http://localhost:3000/mcp
  #   env:
  #     GOOSE_MCP_AUTHORIZATION: Bearer your-mcp-api-key
