# Goose configuration for gpt-image-mcp
# Merge the relevant extension block into: ~/.config/goose/config.yaml
#
# Documentation: https://block.github.io/goose/docs/configuration

extensions:

  # ─── Option A: bun x — no clone needed (RECOMMENDED) ────────────────────
  - name: gpt-image-mcp
    type: stdio
    cmd: bun
    args:
      - x
      - --bun
      - gpt-image-mcp          # latest published version
    env:
      PROVIDER: openai
      OPENAI_API_KEY: sk-replace-with-your-key
      MCP_TRANSPORT: stdio
      LOG_LEVEL: error

  # ─── Option B: pin a specific version ────────────────────────────────────
  # - name: gpt-image-mcp
  #   type: stdio
  #   cmd: bun
  #   args: [x, --bun, "gpt-image-mcp@0.1.0"]
  #   env:
  #     PROVIDER: openai
  #     OPENAI_API_KEY: sk-replace-with-your-key
  #     MCP_TRANSPORT: stdio

  # ─── Option C: npx (no Bun required) ─────────────────────────────────────
  # - name: gpt-image-mcp
  #   type: stdio
  #   cmd: npx
  #   args: [-y, gpt-image-mcp]
  #   env:
  #     PROVIDER: openai
  #     OPENAI_API_KEY: sk-replace-with-your-key
  #     MCP_TRANSPORT: stdio

  # ─── Option D: Azure OpenAI ───────────────────────────────────────────────
  # - name: gpt-image-mcp-azure
  #   type: stdio
  #   cmd: bun
  #   args: [x, --bun, gpt-image-mcp]
  #   env:
  #     PROVIDER: azure
  #     AZURE_OPENAI_ENDPOINT: https://my-resource.openai.azure.com
  #     AZURE_OPENAI_API_KEY: replace-with-azure-key
  #     AZURE_OPENAI_DEPLOYMENT: my-gpt-image-deployment
  #     MCP_TRANSPORT: stdio

  # ─── Option E: local clone (development) ─────────────────────────────────
  # - name: gpt-image-mcp-dev
  #   type: stdio
  #   cmd: bun
  #   args: [run, /absolute/path/to/gpt-image-mcp/src/main.ts]
  #   env:
  #     PROVIDER: openai
  #     OPENAI_API_KEY: sk-replace-with-your-key
  #     MCP_TRANSPORT: stdio

  # ─── Option F: HTTP transport (remote server) ─────────────────────────────
