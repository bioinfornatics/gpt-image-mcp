# Goose configuration for gpt-image-mcp
# Merge the relevant extension block into: ~/.config/goose/config.yaml
#
# Documentation: https://block.github.io/goose/docs/configuration
#
# NOTE: Goose uses a map under `extensions:` (not a list).
#       env_keys:  variables Goose reads from your host environment and forwards.
#       envs:      inline key/value overrides (use for non-secret config only).

extensions:

  # ─── Option A: OpenAI — bunx (RECOMMENDED) ───────────────────────────────
  gptimagemcp:
    enabled: true
    type: stdio
    name: GPT Image MCP
    description: AI image generation — gpt-image-1 via OpenAI
    cmd: bunx
    args:
      - '@bioinfornatics/gpt-image-mcp'
    envs:
      PROVIDER: openai
      MCP_TRANSPORT: stdio
      LOG_LEVEL: error
    env_keys:
      - OPENAI_API_KEY       # export OPENAI_API_KEY=sk-... in your shell / .zshrc
    timeout: 300
    bundled: null
    available_tools: []

  # ─── Option B: Azure AI Foundry ───────────────────────────────────────────
  # gptimagemcp:
  #   enabled: true
  #   type: stdio
  #   name: GPT Image MCP
  #   description: AI image generation — gpt-image-2 via Azure AI Foundry
  #   cmd: bunx
  #   args:
  #     - '@bioinfornatics/gpt-image-mcp'
  #   envs:
  #     PROVIDER: azure
  #     MCP_TRANSPORT: stdio
  #     LOG_LEVEL: error
  #   env_keys:
  #     - AZURE_OPENAI_ENDPOINT      # https://my-resource.openai.azure.com
  #     - AZURE_OPENAI_DEPLOYMENT    # your deployment name
  #     - AZURE_OPENAI_API_KEY
  #   timeout: 300
  #   bundled: null
  #   available_tools: []

  # ─── Option C: pin a specific version ─────────────────────────────────────
  # gptimagemcp:
  #   enabled: true
  #   type: stdio
  #   name: GPT Image MCP
  #   cmd: bunx
  #   args:
  #     - '@bioinfornatics/gpt-image-mcp@0.0.2'
  #   envs:
  #     PROVIDER: openai
  #     MCP_TRANSPORT: stdio
  #   env_keys:
  #     - OPENAI_API_KEY
  #   timeout: 300

  # ─── Option D: HTTP transport (remote / Docker server) ────────────────────
  # gptimagemcp:
  #   enabled: true
  #   type: streamable_http
  #   name: GPT Image MCP (HTTP)
  #   uri: http://localhost:3000/mcp
  #   # If MCP_API_KEY is set on the server, add the Authorization header:
  #   # headers:
  #   #   Authorization: "Bearer your-mcp-api-key"
  #   timeout: 300

